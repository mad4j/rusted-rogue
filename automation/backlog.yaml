project: rusted-rogue
version: 1
policy:
  execution_mode: single_task
  stop_conditions:
    - all_done
    - blocked_unresolvable
  max_fix_attempts_per_task: 3
  required_gates:
    - format
    - lint
    - tests
    - parity_if_applicable

milestones:
  M1: [BL-001, BL-002, BL-003, BL-004]
  M2: [BL-005, BL-006, BL-007, BL-008, BL-009, BL-010, BL-011]
  M3: [BL-012, BL-013, BL-014, BL-015, BL-016, BL-017]
  M4: [BL-018, BL-019, BL-020, BL-021]
  M5: [BL-022, BL-023, BL-024, BL-025]
  M6: [BL-026]

tasks:
  - id: BL-001
    title: Documentare build C e prerequisiti ncurses
    estimate_hours: 1
    deps: []
    status: DONE
    dod: Istruzioni riproducibili build/run e note sui flag Makefile.

  - id: BL-002
    title: Mappare superfici OS-sensitive da machdep
    estimate_hours: 2
    deps: [BL-001]
    status: DONE
    dod: Elenco API signal/uid/terminal/path con rischio e proposta adapter Rust.

  - id: BL-003
    title: Definire golden scenarios baseline C
    estimate_hours: 2
    deps: [BL-001]
    status: DONE
    dod: Scenari minimi definiti per avvio, movimento, combat, inventario, level transition, save/load.

  - id: BL-004
    title: Rendere golden scenarios ripetibili con seed fissato
    estimate_hours: 2
    deps: [BL-003]
    status: DONE
    dod: Tre run consecutive coerenti per scenario.

  - id: BL-005
    title: Disegnare architettura moduli Rust e confini API
    estimate_hours: 2
    deps: [BL-002, BL-004]
    status: DONE
    dod: Mappa modulo-responsabilita e boundary dominio vs IO.

  - id: BL-006
    title: Definire modello dati Rust split item-monster e GameState
    estimate_hours: 3
    deps: [BL-005]
    status: DONE
    dod: Schema tipi approvato con ownership chiara e riduzione stato globale.

  - id: BL-007
    title: Creare skeleton workspace Rust e quality gate
    estimate_hours: 2
    deps: [BL-005]
    status: DONE
    dod: Build green con fmt, clippy e smoke tests.

  - id: BL-008
    title: Portare costanti e bitflags core da rogue.h
    estimate_hours: 2
    deps: [BL-006, BL-007]
    status: DONE
    dod: Modulo types compilabile con test base su flag e limiti mappa.

  - id: BL-009
    title: Portare RNG con parity numerica seed-based
    estimate_hours: 3
    deps: [BL-007]
    status: DONE
    dod: Sequenze RNG coerenti con baseline C su seed noti.

  - id: BL-010
    title: Implementare world grid e room model base
    estimate_hours: 3
    deps: [BL-008]
    status: DONE
